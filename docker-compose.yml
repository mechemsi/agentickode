services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentickode
      POSTGRES_PASSWORD: agentickode
      POSTGRES_DB: agentickode
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentickode"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    ports:
      - "8222:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://agentickode:agentickode@postgres:5432/agentickode
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./alembic.ini:/app/alembic.ini
      - ./alembic:/app/alembic
      - ./.ssh:/app/.ssh
      # Host Docker access for local sandbox execution
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist workspaces (project clones) across rebuilds
      - workspaces:/workspaces
      # Persist agent binaries and credentials across rebuilds
      - agent-binaries:/root/.local
      - agent-config-claude:/root/.claude
      - agent-config-codex:/root/.codex
      - agent-config-gemini:/root/.gemini
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/eslint.config.js:/app/eslint.config.js
    restart: unless-stopped

volumes:
  pgdata:
    name: agentickode-app_pgdata
  redisdata:
    name: agentickode-app_redisdata
  workspaces:
    name: agentickode-app_workspaces
  agent-binaries:
    name: agentickode-app_agent-binaries
  agent-config-claude:
    name: agentickode-app_agent-config-claude
  agent-config-codex:
    name: agentickode-app_agent-config-codex
  agent-config-gemini:
    name: agentickode-app_agent-config-gemini

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "CLA.md"
          branch: "main"
          allowlist: "mechemsi,dependabot[bot],github-actions[bot]"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to agree to our [Contributor License Agreement](CLA.md).

            Please reply with the following to agree:

            > I have read the CLA Document and I hereby sign the CLA

          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"

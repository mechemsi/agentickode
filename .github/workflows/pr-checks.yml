name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which parts of the codebase changed ─────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'alembic/**'
              - 'tests/**'
            frontend:
              - 'frontend/**'

  # ── PR size with human-readable breakdown ────────────────────────
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze PR size
        id: size
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | wc -l)
          INSERTIONS=$(git diff --numstat "$BASE_SHA" "$HEAD_SHA" | awk '{ s += $1 } END { print s+0 }')
          DELETIONS=$(git diff --numstat "$BASE_SHA" "$HEAD_SHA" | awk '{ s += $2 } END { print s+0 }')
          TOTAL_LINES=$((INSERTIONS + DELETIONS))

          # T-shirt size
          if [ "$TOTAL_LINES" -le 100 ] && [ "$FILES" -le 5 ]; then
            SIZE="S"
          elif [ "$TOTAL_LINES" -le 500 ] && [ "$FILES" -le 15 ]; then
            SIZE="M"
          elif [ "$TOTAL_LINES" -le 1500 ] && [ "$FILES" -le 30 ]; then
            SIZE="L"
          else
            SIZE="XL"
          fi

          # Per-directory breakdown (top 8 directories by lines changed)
          BREAKDOWN=$(git diff --numstat "$BASE_SHA" "$HEAD_SHA" | \
            awk '{ dir=$3; sub(/\/[^\/]*$/, "", dir); ins+=$1; del+=$2; d[dir]+=$1+$2 } END { for (k in d) print d[k], k }' | \
            sort -rn | head -8 | \
            awk '{ printf "%s | %s\\n", $2, $1 }')

          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "insertions=$INSERTIONS" >> "$GITHUB_OUTPUT"
          echo "deletions=$DELETIONS" >> "$GITHUB_OUTPUT"
          echo "lines=$TOTAL_LINES" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "breakdown<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BREAKDOWN" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          STATUS="pass"
          if [ "$FILES" -gt 20 ] || [ "$TOTAL_LINES" -gt 1500 ]; then
            STATUS="warn"
          fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        uses: actions/github-script@v7
        env:
          PR_FILES: ${{ steps.size.outputs.files }}
          PR_INSERTIONS: ${{ steps.size.outputs.insertions }}
          PR_DELETIONS: ${{ steps.size.outputs.deletions }}
          PR_LINES: ${{ steps.size.outputs.lines }}
          PR_SIZE: ${{ steps.size.outputs.size }}
          PR_STATUS: ${{ steps.size.outputs.status }}
          PR_BREAKDOWN: ${{ steps.size.outputs.breakdown }}
        with:
          script: |
            const files = parseInt(process.env.PR_FILES, 10);
            const insertions = parseInt(process.env.PR_INSERTIONS, 10);
            const deletions = parseInt(process.env.PR_DELETIONS, 10);
            const lines = parseInt(process.env.PR_LINES, 10);
            const size = process.env.PR_SIZE;
            const status = process.env.PR_STATUS;
            const breakdown = process.env.PR_BREAKDOWN;
            const marker = '<!-- pr-size-check -->';

            // If under limits, remove existing comment if any
            if (status === 'pass') {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c => c.body.includes(marker));
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const sizeEmoji = { S: ':white_check_mark:', M: ':yellow_circle:', L: ':orange_circle:', XL: ':red_circle:' }[size] || ':question:';
            const filesIcon = files > 20 ? ':x:' : ':white_check_mark:';
            const linesIcon = lines > 1500 ? ':x:' : ':white_check_mark:';

            const bodyLines = [
              marker,
              `### ${sizeEmoji} PR Size: **${size}**`,
              '',
              '| Metric | Value | Limit | Status |',
              '|--------|------:|------:|--------|',
              `| Files changed | ${files} | 20 | ${filesIcon} |`,
              `| Lines changed | +${insertions} -${deletions} = ${lines} | 1,500 | ${linesIcon} |`,
              '',
            ];

            // Add per-directory breakdown
            if (breakdown && breakdown.trim()) {
              bodyLines.push(
                '<details>',
                '<summary>Lines changed by directory</summary>',
                '',
                '| Directory | Lines |',
                '|-----------|------:|',
              );
              for (const line of breakdown.trim().split('\n')) {
                if (line.trim()) {
                  const [dir, count] = line.split(' | ');
                  bodyLines.push(`| \`${dir.trim()}\` | ${count.trim()} |`);
                }
              }
              bodyLines.push('', '</details>', '');
            }

            bodyLines.push('> Consider splitting this PR into smaller, focused changes.');

            const body = bodyLines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Backend-only checks ────────────────────────────────────────
  alembic-check:
    name: Alembic Migration Check
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if branch is behind main
        id: behind
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF"
          BEHIND=$(git rev-list --count "HEAD..origin/$BASE_REF" -- alembic/)
          echo "count=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -gt 0 ]; then
            echo "status=behind" >> "$GITHUB_OUTPUT"
          else
            echo "status=ok" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for multiple migration heads
        id: heads
        run: |
          set +e
          OUTPUT=$(python scripts/check_alembic_heads.py 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        uses: actions/github-script@v7
        env:
          BEHIND_STATUS: ${{ steps.behind.outputs.status }}
          BEHIND_COUNT: ${{ steps.behind.outputs.count }}
          HEADS_EXIT: ${{ steps.heads.outputs.exit_code }}
          HEADS_OUTPUT: ${{ steps.heads.outputs.output }}
        with:
          script: |
            const marker = '<!-- alembic-check -->';
            const behindStatus = process.env.BEHIND_STATUS;
            const behindCount = process.env.BEHIND_COUNT;
            const headsExit = parseInt(process.env.HEADS_EXIT, 10);
            const headsOutput = process.env.HEADS_OUTPUT;
            const hasIssues = behindStatus === 'behind' || headsExit !== 0;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            // All clear — remove comment if it exists
            if (!hasIssues) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const lines = [marker, '### :warning: Alembic Migration Check', ''];

            if (behindStatus === 'behind') {
              lines.push(
                `**Branch is ${behindCount} commit(s) behind \`main\` in \`alembic/\`.**`,
                'Rebase or merge main to avoid migration conflicts.',
                ''
              );
            }

            if (headsExit !== 0) {
              lines.push(
                '**Multiple migration heads detected:**',
                '```',
                headsOutput,
                '```',
                '',
                'Fix: run `alembic merge heads -m merge_migrations` or rebase your migration.',
              );
            }

            const body = lines.join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on multiple heads
        if: steps.heads.outputs.exit_code != '0'
        run: exit 1

  # ── Copy-paste detection (comment-only, never blocks merge) ────
  duplication:
    name: Copy-Paste Detection
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install jscpd
        run: npm install -g jscpd@4

      - name: Run copy-paste detection
        id: cpd
        env:
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
        run: |
          set +e

          # Run jscpd on backend + tests (Python)
          BACKEND_OUTPUT=""
          if [ "$BACKEND_CHANGED" = "true" ]; then
            BACKEND_OUTPUT=$(jscpd backend/ tests/ \
              --min-lines 10 \
              --min-tokens 50 \
              --threshold 5 \
              --reporters consoleFull \
              --ignore "**/__pycache__/**,**/.pytest_cache/**" \
              --format "python" \
              2>&1) || true
          fi

          # Run jscpd on frontend (TypeScript)
          FRONTEND_OUTPUT=""
          if [ "$FRONTEND_CHANGED" = "true" ]; then
            FRONTEND_OUTPUT=$(jscpd frontend/src/ \
              --min-lines 8 \
              --min-tokens 40 \
              --threshold 5 \
              --reporters consoleFull \
              --ignore "**/node_modules/**,**/__tests__/**,**/types/**" \
              --format "typescript,tsx" \
              2>&1) || true
          fi

          # Extract duplication percentages
          BACKEND_PCT=$(echo "$BACKEND_OUTPUT" | grep -oP '[\d.]+(?=% \()' | tail -1 || echo "0")
          FRONTEND_PCT=$(echo "$FRONTEND_OUTPUT" | grep -oP '[\d.]+(?=% \()' | tail -1 || echo "0")
          BACKEND_CLONES=$(echo "$BACKEND_OUTPUT" | grep -oP '\d+(?= clone)' | head -1 || echo "0")
          FRONTEND_CLONES=$(echo "$FRONTEND_OUTPUT" | grep -oP '\d+(?= clone)' | head -1 || echo "0")

          # Extract clone details (file pairs)
          BACKEND_DETAILS=$(echo "$BACKEND_OUTPUT" | grep -A2 "Clone found" | head -60 || echo "")
          FRONTEND_DETAILS=$(echo "$FRONTEND_OUTPUT" | grep -A2 "Clone found" | head -60 || echo "")

          {
            echo "backend_pct=${BACKEND_PCT:-0}"
            echo "frontend_pct=${FRONTEND_PCT:-0}"
            echo "backend_clones=${BACKEND_CLONES:-0}"
            echo "frontend_clones=${FRONTEND_CLONES:-0}"
          } >> "$GITHUB_OUTPUT"

          HAS_ISSUES="false"
          if [ "${BACKEND_CLONES:-0}" -gt 0 ] 2>/dev/null || [ "${FRONTEND_CLONES:-0}" -gt 0 ] 2>/dev/null; then
            HAS_ISSUES="true"
          fi
          echo "has_issues=$HAS_ISSUES" >> "$GITHUB_OUTPUT"

          # Save full output for comment
          {
            echo "backend_details<<EOF"
            echo "$BACKEND_DETAILS"
            echo "EOF"
            echo "frontend_details<<EOF"
            echo "$FRONTEND_DETAILS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          HAS_ISSUES: ${{ steps.cpd.outputs.has_issues }}
          BACKEND_PCT: ${{ steps.cpd.outputs.backend_pct }}
          FRONTEND_PCT: ${{ steps.cpd.outputs.frontend_pct }}
          BACKEND_CLONES: ${{ steps.cpd.outputs.backend_clones }}
          FRONTEND_CLONES: ${{ steps.cpd.outputs.frontend_clones }}
          BACKEND_DETAILS: ${{ steps.cpd.outputs.backend_details }}
          FRONTEND_DETAILS: ${{ steps.cpd.outputs.frontend_details }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
        with:
          script: |
            const marker = '<!-- cpd-check -->';
            const hasIssues = process.env.HAS_ISSUES === 'true';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (!hasIssues) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const backendClones = parseInt(process.env.BACKEND_CLONES || '0', 10);
            const frontendClones = parseInt(process.env.FRONTEND_CLONES || '0', 10);
            const backendPct = process.env.BACKEND_PCT || '0';
            const frontendPct = process.env.FRONTEND_PCT || '0';
            const backendDetails = process.env.BACKEND_DETAILS || '';
            const frontendDetails = process.env.FRONTEND_DETAILS || '';

            const lines = [marker, '### :scissors: Copy-Paste Detection (jscpd)', ''];

            lines.push(
              '| Area | Clones | Duplication |',
              '|------|-------:|------------:|',
            );
            if (process.env.BACKEND_CHANGED === 'true') {
              const icon = backendClones > 0 ? ':warning:' : ':white_check_mark:';
              lines.push(`| Backend (Python) | ${backendClones} | ${backendPct}% ${icon} |`);
            }
            if (process.env.FRONTEND_CHANGED === 'true') {
              const icon = frontendClones > 0 ? ':warning:' : ':white_check_mark:';
              lines.push(`| Frontend (TypeScript) | ${frontendClones} | ${frontendPct}% ${icon} |`);
            }
            lines.push('');

            if (backendClones > 0 && backendDetails.trim()) {
              lines.push(
                '<details>',
                '<summary>Backend duplicates</summary>',
                '',
                '```',
                backendDetails.trim(),
                '```',
                '',
                '</details>',
                '',
              );
            }

            if (frontendClones > 0 && frontendDetails.trim()) {
              lines.push(
                '<details>',
                '<summary>Frontend duplicates</summary>',
                '',
                '```',
                frontendDetails.trim(),
                '```',
                '',
                '</details>',
                '',
              );
            }

            lines.push(
              '---',
              '> **Tip:** Extract duplicated code into shared helpers or utilities. This check is informational and does not block merging.',
            );

            const body = lines.join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Complexity checks (comment-only, never blocks merge) ───────
  complexity:
    name: Code Complexity Report
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "$BASE_REF"
          BASE="origin/$BASE_REF"

          # Backend: only .py files under backend/
          BACKEND_FILES=$(git diff --name-only "$BASE"...HEAD -- 'backend/**/*.py' || true)
          echo "backend_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BACKEND_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Frontend: only .ts/.tsx files under frontend/src/
          FRONTEND_FILES=$(git diff --name-only "$BASE"...HEAD -- 'frontend/src/**/*.ts' 'frontend/src/**/*.tsx' | sed 's|^frontend/||' || true)
          echo "frontend_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FRONTEND_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Backend complexity check
        id: backend-complexity
        if: needs.changes.outputs.backend == 'true' && steps.changed-files.outputs.backend_files != ''
        run: |
          pip install -q radon
          FILES="${{ steps.changed-files.outputs.backend_files }}"
          FILE_ARGS=$(echo "$FILES" | tr '\n' ' ')
          set +e
          OUTPUT=$(python scripts/check_complexity.py C $FILE_ARGS 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          echo "$OUTPUT" > /tmp/backend-complexity.txt
          echo "has_issues=$( [ $EXIT_CODE -eq 1 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Frontend complexity check
        id: frontend-complexity
        if: needs.changes.outputs.frontend == 'true' && steps.changed-files.outputs.frontend_files != ''
        working-directory: frontend
        run: |
          npm ci --silent
          FILES="${{ steps.changed-files.outputs.frontend_files }}"
          FILE_ARGS=$(echo "$FILES" | tr '\n' ' ')
          set +e
          OUTPUT=$(node scripts/check-complexity.mjs 15 $FILE_ARGS 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          echo "$OUTPUT" > /tmp/frontend-complexity.txt
          echo "has_issues=$( [ $EXIT_CODE -eq 1 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post or update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          BACKEND_HAS_ISSUES: ${{ steps.backend-complexity.outputs.has_issues }}
          FRONTEND_HAS_ISSUES: ${{ steps.frontend-complexity.outputs.has_issues }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- complexity-check -->';
            const backendHasIssues = process.env.BACKEND_HAS_ISSUES === 'true';
            const frontendHasIssues = process.env.FRONTEND_HAS_ISSUES === 'true';
            const backendChanged = process.env.BACKEND_CHANGED === 'true';
            const frontendChanged = process.env.FRONTEND_CHANGED === 'true';
            const hasAnyIssues = backendHasIssues || frontendHasIssues;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (!hasAnyIssues) {
              // No issues — remove old comment if it exists
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const lines = [marker, '### Code Complexity Report', ''];

            if (backendChanged && backendHasIssues) {
              let backendOutput = 'No output';
              try { backendOutput = fs.readFileSync('/tmp/backend-complexity.txt', 'utf8'); } catch {}
              lines.push(
                '#### Backend (Python — radon cyclomatic complexity)',
                '',
                '```',
                backendOutput.trim(),
                '```',
                '',
                '**Grades:** A (1-5) simple | B (6-10) well-structured | **C (11-15) slightly complex** | D (16-20) more complex | E (21-25) very complex | F (26+) unmaintainable',
                ''
              );
            }

            if (frontendChanged && frontendHasIssues) {
              let frontendOutput = 'No output';
              try { frontendOutput = fs.readFileSync('/tmp/frontend-complexity.txt', 'utf8'); } catch {}
              lines.push(
                '#### Frontend (TypeScript — ESLint complexity rule)',
                '',
                '```',
                frontendOutput.trim(),
                '```',
                ''
              );
            }

            lines.push(
              '---',
              '> **Note:** This check is informational only and does not block merging. Consider refactoring high-complexity functions into smaller, focused units.'
            );

            const body = lines.join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

name: Dependency Audit

on:
  schedule:
    - cron: "0 7 */2 * *" # Every other day at 07:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  frontend-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: npm audit
        run: npm audit --json > ../frontend-vulnerabilities.json 2>&1 || true

      - name: npm outdated
        run: npm outdated --json > ../frontend-outdated.json 2>&1 || true

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-audit
          path: |
            frontend-vulnerabilities.json
            frontend-outdated.json
          retention-days: 7

  backend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt -r requirements-dev.txt pip-audit

      - name: pip-audit
        run: pip-audit --format=json --output=backend-vulnerabilities.json 2>&1 || true

      - name: pip outdated
        run: pip list --outdated --format=json > backend-outdated.json 2>&1 || true

      - uses: actions/upload-artifact@v4
        with:
          name: backend-audit
          path: |
            backend-vulnerabilities.json
            backend-outdated.json
          retention-days: 7

  report:
    needs: [frontend-audit, backend-audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-audit
          path: artifacts/frontend

      - uses: actions/download-artifact@v4
        with:
          name: backend-audit
          path: artifacts/backend

      - name: Generate reports and manage issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +"%Y-%m-%d")

          # ── Build VULNERABILITIES report ──
          VULN_REPORT="# Security Vulnerabilities — ${DATE}\n\n"
          HAS_VULNS=false

          # Frontend vulnerabilities
          VULN_REPORT+="## Frontend (npm)\n\n"
          FV_FILE="artifacts/frontend/frontend-vulnerabilities.json"
          if [ -s "$FV_FILE" ] && jq -e '.vulnerabilities' "$FV_FILE" > /dev/null 2>&1; then
            VULN_COUNT=$(jq '[.vulnerabilities | to_entries[] | .value] | length' "$FV_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_COUNT" -gt 0 ]; then
              HAS_VULNS=true
              VULN_REPORT+="| Package | Severity | Via | Fix Available |\n"
              VULN_REPORT+="|---------|----------|-----|---------------|\n"
              VULN_REPORT+=$(jq -r '
                .vulnerabilities | to_entries[] |
                "| \(.key) | \(.value.severity) | \(.value.via | if type == "array" then [.[] | if type == "string" then . else .name end] | join(", ") else . end) | \(.value.fixAvailable // "no") |"
              ' "$FV_FILE" 2>/dev/null || echo "| Error parsing output | | | |")
              VULN_REPORT+="\n"
            else
              VULN_REPORT+="No vulnerabilities found.\n"
            fi
          else
            VULN_REPORT+="No vulnerabilities found.\n"
          fi

          # Backend vulnerabilities
          VULN_REPORT+="\n## Backend (pip)\n\n"
          BV_FILE="artifacts/backend/backend-vulnerabilities.json"
          if [ -s "$BV_FILE" ] && jq -e '.dependencies' "$BV_FILE" > /dev/null 2>&1; then
            VULN_DEPS=$(jq '[.dependencies[] | select(.vulns | length > 0)] | length' "$BV_FILE" 2>/dev/null || echo 0)
            if [ "$VULN_DEPS" -gt 0 ]; then
              HAS_VULNS=true
              VULN_REPORT+="| Package | Version | Vulnerability | Fix |\n"
              VULN_REPORT+="|---------|---------|---------------|-----|\n"
              VULN_REPORT+=$(jq -r '
                .dependencies[] | select(.vulns | length > 0) |
                .name as $name | .version as $ver |
                .vulns[] | "| \($name) | \($ver) | \(.id) — \(.description[:80]) | \(.fix_versions | join(", ")) |"
              ' "$BV_FILE" 2>/dev/null || echo "| Error parsing output | | | |")
              VULN_REPORT+="\n"
            else
              VULN_REPORT+="No vulnerabilities found.\n"
            fi
          else
            VULN_REPORT+="No vulnerabilities found.\n"
          fi

          VULN_REPORT+="\n---\n*Auto-generated by dependency-audit workflow*"

          # ── Build OUTDATED report ──
          OUTDATED_REPORT="# Outdated Dependencies — ${DATE}\n\n"
          HAS_OUTDATED=false

          # Frontend outdated
          OUTDATED_REPORT+="## Frontend (npm)\n\n"
          FO_FILE="artifacts/frontend/frontend-outdated.json"
          if [ -s "$FO_FILE" ] && jq -e 'keys | length > 0' "$FO_FILE" > /dev/null 2>&1; then
            HAS_OUTDATED=true
            OUTDATED_REPORT+="| Package | Current | Wanted | Latest |\n"
            OUTDATED_REPORT+="|---------|---------|--------|--------|\n"
            OUTDATED_REPORT+=$(jq -r 'to_entries[] | "| \(.key) | \(.value.current) | \(.value.wanted) | \(.value.latest) |"' "$FO_FILE" 2>/dev/null || echo "| Error parsing output | | | |")
            OUTDATED_REPORT+="\n"
          else
            OUTDATED_REPORT+="All packages are up to date.\n"
          fi

          # Backend outdated
          OUTDATED_REPORT+="\n## Backend (pip)\n\n"
          BO_FILE="artifacts/backend/backend-outdated.json"
          if [ -s "$BO_FILE" ] && jq -e 'length > 0' "$BO_FILE" > /dev/null 2>&1; then
            HAS_OUTDATED=true
            OUTDATED_REPORT+="| Package | Current | Latest |\n"
            OUTDATED_REPORT+="|---------|---------|--------|\n"
            OUTDATED_REPORT+=$(jq -r '.[] | "| \(.name) | \(.version) | \(.latest_version) |"' "$BO_FILE" 2>/dev/null || echo "| Error parsing output | | |")
            OUTDATED_REPORT+="\n"
          else
            OUTDATED_REPORT+="All packages are up to date.\n"
          fi

          OUTDATED_REPORT+="\n---\n*Auto-generated by dependency-audit workflow*"

          # ── Helper: manage a single issue ──
          manage_issue() {
            local LABEL="$1"
            local COLOR="$2"
            local DESCRIPTION="$3"
            local TITLE="$4"
            local BODY="$5"
            local HAS_FINDINGS="$6"

            gh label create "$LABEL" --color "$COLOR" --description "$DESCRIPTION" 2>/dev/null || true

            EXISTING=$(gh issue list --label "$LABEL" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

            if [ "$HAS_FINDINGS" = true ]; then
              if [ -n "$EXISTING" ]; then
                echo -e "$BODY" | gh issue edit "$EXISTING" --body-file -
                echo "Updated issue #${EXISTING} (${LABEL})"
              else
                echo -e "$BODY" | gh issue create --title "$TITLE" --label "$LABEL" --body-file -
                echo "Created issue (${LABEL})"
              fi
            else
              if [ -n "$EXISTING" ]; then
                gh issue close "$EXISTING" --comment "All clear as of ${DATE}. Closing."
                echo "Closed issue #${EXISTING} (${LABEL})"
              else
                echo "No findings for ${LABEL} — nothing to do"
              fi
            fi
          }

          # ── Manage both issues ──
          manage_issue \
            "security-vulnerabilities" "e11d48" "Automated security vulnerability findings" \
            "Security Vulnerabilities — ${DATE}" "$VULN_REPORT" "$HAS_VULNS"

          manage_issue \
            "outdated-dependencies" "fbca04" "Automated outdated dependency findings" \
            "Outdated Dependencies — ${DATE}" "$OUTDATED_REPORT" "$HAS_OUTDATED"
